name: CI

on:
  workflow_dispatch: # Manuel çalıştırma butonu ekler
  push:
    branches: [main] # Kod güncellediğinde otomatik çalışır
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: 🔎 Change Detection
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5
      - name: 🧭 Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'apps/dsa-web/**'

  ai-governance:
    name: ai-governance
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5
      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: 🤖 Check AI governance assets
        run: python scripts/check_ai_assets.py

  backend-gate:
    name: backend-gate
    runs-on: ubuntu-latest
    needs: [ai-governance]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5
      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest
      - name: ✅ Run backend gate
        run: ./scripts/ci_gate.sh

  # ASIL ANALİZİ BAŞLATAN YENİ BÖLÜM
  run-analysis:
    name: 📈 Run Stock Analysis
    runs-on: ubuntu-latest
    needs: [backend-gate]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5
      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt
      - name: 🚀 Execute Stock Analysis
        env:
          # GitHub Variables kısmına eklediğin hisse listesini buraya bağladık
          STOCK_LIST: ${{ vars.STOCK_LIST }} 
          # Eğer bir API KEY (Gemini, OpenAI vb.) varsa onu da Secrets'a ekleyip buraya yazmalısın
          # Örnek: GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python -m bot.main  # Botun ana giriş noktasını tetikler
          
  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    needs: [backend-gate]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5
      - name: 🐳 Build image
        run: |
          docker build -t stock-analysis:test -f docker/Dockerfile .
