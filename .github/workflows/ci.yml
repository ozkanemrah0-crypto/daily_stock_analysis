name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ... (üstteki diğer kısımlar aynı kalabilir, ama garanti olsun diye hepsini veriyorum)
  ai-governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: python scripts/check_ai_assets.py

  backend-gate:
    runs-on: ubuntu-latest
    needs: [ai-governance]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: |
          pip install -r requirements.txt
          pip install flake8 pytest
      - run: ./scripts/ci_gate.sh

  run-analysis:
    name: 📈 Run Stock Analysis
    runs-on: ubuntu-latest
    needs: [backend-gate]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5
      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: 📦 Install dependencies
        run: pip install -r requirements.txt
      - name: 🚀 Execute Stock Analysis
        env:
          STOCK_LIST: ${{ vars.STOCK_LIST }}
          # Buraya varsa API Keylerini eklemelisin, yoksa analiz hata verebilir
          # GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} 
        run: |
          # Bu komut projenin ana giriş noktasını doğru klasörden tetikler
          export PYTHONPATH=$PYTHONPATH:.
          python main.py
